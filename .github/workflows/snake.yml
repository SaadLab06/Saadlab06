name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: SaadLab06
          outputs: |
            dist/snake.svg?color_snake=#1E1913&color_dots=#e4d9bf,#cdb992,#c9973b,#b3312a,#6e1f18
            dist/snake-dark.svg?color_snake=#E8DCC0&color_dots=#221c17,#4a2e22,#7a2f24,#a63329,#c9973b

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
